<!DOCTYPE html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <title>Toloseo - Transit Toulouse en temps reel</title>
    <meta
      name="description"
      content="Visualisation temps reel du reseau de transport en commun de Toulouse Metropole"
    />

    <!-- OG Tags -->
    <meta property="og:title" content="Toloseo" />
    <meta
      property="og:description"
      content="Transit Toulouse en temps reel - Metro, Tram, Bus, Teleocab"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="preconnect" href="/api" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Geist variable + Fraunces (editorial) + JetBrains Mono (numerics) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta
      name="theme-color"
      content="#f5ede2"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1a1216"
      media="(prefers-color-scheme: dark)"
    />

    <!-- iOS standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Toloseo" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1a1216;
        color: #f5ede2;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      html[data-theme="light"] body {
        background: #f5ede2;
        color: #2a1f26;
      }
      #app {
        height: 100%;
      }
      /* Prevent FOUC: hide until SolidJS hydrates */
      .app-layout {
        opacity: 0;
        animation: fadeIn 0.2s ease-out 0.1s forwards;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
    <!-- Apply theme before render to prevent flash -->
    <script>
      (function () {
        var stored = localStorage.getItem("toloseo-theme");
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
