<!DOCTYPE html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toloseo - Transit Toulouse en temps reel</title>
    <meta
      name="description"
      content="Visualisation temps reel du reseau de transport en commun de Toulouse Metropole"
    />

    <!-- OG Tags -->
    <meta property="og:title" content="Toloseo" />
    <meta
      property="og:description"
      content="Transit Toulouse en temps reel - Metro, Tram, Bus, Teleocab"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="preconnect" href="/api" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d0f1a" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f1117;
        color: #e4e6ef;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      html[data-theme="light"] body { background: #f8f9fb; color: #1a1d27; }
      #app { height: 100%; }
      /* Prevent FOUC: hide until SolidJS hydrates */
      .app-layout { opacity: 0; animation: fadeIn 0.2s ease-out 0.1s forwards; }
      @keyframes fadeIn { to { opacity: 1; } }
    </style>
    <!-- Apply theme before render to prevent flash -->
    <script>
      (function() {
        var t = localStorage.getItem('toloseo-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
